# ─────────────────────────────────────────────────────────────────────────────
# WhatsApp Gateway — Docker Compose
# Usage:
#   cp .env.example .env   # fill in API_KEY, JWT_SECRET
#   docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wa_net

  # ── Backend (Node.js + Baileys) ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DB_PATH=/app/data/gateway.db
    volumes:
      # Persist WhatsApp sessions (QR scan survives container restart)
      - ./sessions:/app/sessions
      # Persist SQLite database (users, API keys, instances, aliases, logs)
      - db_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks:
      - wa_net

  # ── SQLite Web (database browser) ────────────────────────────────────────
  sqlite-web:
    image: coleifer/sqlite-web
    restart: always
    ports:
      - "3002:8080"
    volumes:
      - db_data:/data
    environment:
      - SQLITE_WEB_PASSWORD=${SQLITE_WEB_PASSWORD:-admin}
    command: sh -c "sqlite_web -H 0.0.0.0 -p 8080 -P $$SQLITE_WEB_PASSWORD -x /data/gateway.db"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wa_net

  # ── Frontend (React + nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Bake the backend API URL into the Vite build (not needed — using nginx proxy)
        VITE_API_KEY: ${VITE_API_KEY:-}
    restart: always
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wa_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  redis_data:
  db_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  wa_net:
    driver: bridge
